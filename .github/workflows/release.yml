name: Release

# 触发条件：推送形如 v1.2.3 的 tag 时自动发布
# 也支持在 Actions 页面手动触发（方便补发）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的版本号（不带 v 前缀，如 0.1.0）'
        required: true

permissions:
  contents: write # 创建 Release 需要

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm compile

      - name: Build & Zip (Chrome + Firefox)
        run: pnpm zip:all

      - name: List artifacts
        run: ls -la .output/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # tag 触发时用 tag 名；手动触发时用输入的版本号
          tag_name: ${{ github.event.inputs.tag && format('v{0}', github.event.inputs.tag) || github.ref_name }}
          name: ${{ github.event.inputs.tag && format('v{0}', github.event.inputs.tag) || github.ref_name }}
          generate_release_notes: true # 自动根据 commit 生成 changelog
          draft: false
          prerelease: false
          files: |
            .output/*.zip
