<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab It</title>
    <style>
      /* popup 自身尺寸：固定 360 宽，高度由内容决定。
         必须用 !important 覆盖 global.css 中 @layer base 的
         `html, body, #root { @apply h-full w-full }`，否则在 popup 上下文里
         html/body 会被 width:100% 吃成"按内容撑开"，导致整个弹窗被压成一条窄柱。 */
      html, body {
        width: 360px !important;
        min-width: 360px !important;
        height: auto !important;
        margin: 0 !important;
      }
      #root {
        width: 360px !important;
        min-width: 360px !important;
        height: auto !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
